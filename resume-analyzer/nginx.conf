server {
    listen 80;

    # ---- Serve React App ----
    # All static files (HTML, CSS, JS) are served from this directory
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # try_files: First try the exact URL, then try as a directory,
        # then fall back to index.html.
        # This is REQUIRED for React Router — without it, refreshing
        # on /dashboard or /login would return a 404 from Nginx
        try_files $uri $uri/ /index.html;
    }

    # ---- Proxy API Requests to Django ----
    # Any request starting with /api/ gets forwarded to the Django backend
    # "backend" is the service name from docker-compose.yml
    # Docker's internal DNS resolves "backend" to the backend container's IP
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}